<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        const originalStringify = JSON.stringify;
        JSON.stringify = function (value, replacer, space) {
          const seen = new WeakSet();
          function safeReplacer(key, val) {
            if (val !== null && typeof val === "object") {
              if (val instanceof Node) {
                return {
                  nodeType: val.nodeType,
                  nodeName: val.nodeName,
                  id: val.id || undefined,
                  className: val.className || undefined
                };
              }
              if (seen.has(val)) {
                return "[Circular]";
              }
              seen.add(val);
            }
            if (typeof replacer === "function") {
              return replacer.call(this, key, val);
            }
            return val;
          }

          const finalReplacer = Array.isArray(replacer)
            ? function(key, val) {
                return replacer.includes(key) ? safeReplacer.call(this, key, val) : undefined;
              }
            : safeReplacer;

          try {
            return originalStringify(value, finalReplacer, space);
          } catch (err) {
            try {
              const simpleSeen = new WeakSet();
              return originalStringify(value, function(k, v) {
                if (v !== null && typeof v === "object") {
                  if (v instanceof Node) return "[DOMNode]";
                  if (simpleSeen.has(v)) return "[Circular]";
                  simpleSeen.add(v);
                }
                return v;
              }, space);
            } catch (innerErr) {
              return '"[Unserializable]"';
            }
          }
        };
      })();
    </script>
